[variables]
NIXPACKS_PHP_ROOT_DIR = "/app/public"

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.build]
cmds = [
  "composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader",
  "npm ci",
  "npm run build && ls -la public/build && test -f public/build/manifest.json && cat public/build/manifest.json",
  "rm -f public/hot"
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=${PORT:-8080}"
